name: aplikasi_alarm
description: "A new Flutter project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.5

dependencies:
  flutter:
    sdk: flutter

  # Package alarm: handles background alarm, wake screen, full-screen intent
  alarm: ^5.3.0

  cupertino_icons: ^1.0.8
  intl: ^0.20.2
  firebase_core: ^4.9.0
  cloud_firestore: ^6.4.1
  vibration: ^3.1.8
  shared_preferences: ^2.5.5

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/sounds/sound1.mp3
    - assets/sounds/sound2.mp3